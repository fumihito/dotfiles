# set default settings {{{
set-option -g set-titles on
set-option -wg automatic-rename off
set-option -wg aggressive-resize on
set-option -g remain-on-exit off
set-option -g focus-events on

unbind-key -n C-b
unbind-key -n C-a
set -g prefix C-a
set -g prefix2 C-A
bind-key a send-prefix

set -g window-style 'bg=colour236'
set -g window-active-style 'bg=black'

# }}}

# Screen compatibilities {{{
# lockscreen ^X x
unbind C-x
bind-key C-x lock-server
unbind x
bind-key x lock-server

# screen ^C c
unbind C-c
bind-key C-c new-window

# detach ^D d
unbind d
bind-key d detach

# displays *
unbind *
bind-key * list-clients

# next ^@ ^N sp n
unbind C-n
bind-key C-n next-window
unbind n
bind-key n next-window

unbind C-p
bind-key C-p previous-window
unbind p
bind-key p previous-window
# }}}

# more quick settings {{{
set-option -s escape-time 1
set-option -g display-time 800
set-option -g repeat-time 1200
# }}}

# }}}
# set history buffer and limits {{{
set-option -g buffer-limit 31
set-option -g history-limit 819200
# }}}

# 256 colors {{{
set-option -g default-terminal "tmux-256color"
# }}}


# Emacs(GNU Screen) like bind {{{
unbind 1
bind-key 1 break-pane \; display-panes
unbind 2
bind-key 2 split-window -v \; display-panes
unbind 3
bind-key 3 split-window -h \; display-panes
unbind C-k
bind-key C-k confirm kill-pane
unbind K
bind-key K confirm kill-pane
bind-key -r C-o   select-pane -t :.+ \; refresh-client
bind-key -r o display-panes \; select-pane -t :.+ \; refresh-client
bind-key -r Space rotate-window
bind-key -r L next-layout
unbind &
bind-key C-a last-window
bind-key A command-prompt -p "New window name:" "rename-window %%"
bind-key S command-prompt -p "New session name:" "rename-session %%"
# }}}

# pane refresh {{{
unbind C-l
bind-key -r C-l refresh-client \; display "Terminal Refresh!"
# }}}

# pane control {{{
bind-key -r < resize-pane -L
bind-key -r - resize-pane -D
bind-key -r + resize-pane -U
bind-key -r > resize-pane -R
# }}}

# vi(GNU Screen) like keybind for copy and paste mode {{{
set-option -wg mode-keys vi
# }}}

# active pane indicator {{{
## Monitoring settings
set-option -wg monitor-silence 30
set-option -wg monitor-activity on
set-option -wg monitor-bell on
set-option -wg visual-activity on

# Mouse {{{
set-option -g mouse on
set-option -g alternate-screen on
bind-key m if-shell "tmux show-options -g mouse | grep off" "set-option -g mouse on" "set-option -g mouse off"
# wheel now can scroll 
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# }}}

## bell
set-option -g visual-bell off
set-option -g visual-silence on
set-option -g bell-action any
set-option -g silence-action any
set-option -g activity-action other
set-option -wg window-status-bell-style bg=yellow,blink,fg=magenta,bold

# }}}

# compatibility settings for some term environments {{{
set-option -ga terminal-overrides ',xterm*:smcup@:rmcup@'
# }}}

# Copy and paste handlers {{{

## copy mode bindings
bind-key [ copy-mode \; display "(copy mode)"
bind-key Escape copy-mode \; display "(copy mode)"
bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi d send-keys -X copy-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X clear-selection
bind-key -T copy-mode-vi C-n send-keys -X cursor-down
bind-key -T copy-mode-vi C-p send-keys -X cursor-up
bind-key -T copy-mode-vi PPage send-keys -X page-up
bind-key -T copy-mode-vi NPage send-keys -X page-down
bind-key -T copy-mode-vi C-g send-keys -X cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection

unbind -T copy-mode-vi C-c
unbind -T copy-mode-vi q

# paste operations
bind-key ] paste-buffer \; display "pasted."
bind-key C-] choose-buffer
# }}}

# scroll handler {{{
unbind M-NPage
unbind M-PPage
bind-key -n M-NPage copy-mode \; send-keys NPage
bind-key -n M-PPage copy-mode \; send-keys PPage
# }}}

# reload config {{{
bind-key R source-file ~/.tmux.conf \; display "Configuration Reloaded!"
# }}}

# display/window control {{{1
#set-option display-panes-time 1400
bind-key P display-panes
bind-key C-f command-prompt -p "search:" "find-window '%%'"
bind-key W command-prompt -p "swap-window from:,to:" "swap-window -s '%1' -t '%2'"
bind-key j command-prompt -p "join to:"   "join-pane -t '%1'"
bind-key J command-prompt -p "pull from:" "join-pane -s '%1'"
bind-key D break-pane -d \; display "break-pane"
# }}}

# session control{{{
bind-key C-s choose-session \; display "(choose-session)"
bind-key N confirm new-session
bind-key w choose-tree
# }}}

# Utilities {{{

## load file
bind-key i   command-prompt -p "(load-and-paste) file?" "load-buffer %%" \; paste-buffer
bind-key I   command-prompt -p "(load-buffer) file?" "load-buffer %%"

## SSH and common command sessions
bind-key t   command-prompt -I "ssh " -p "new:"    "new-window -n '(%1)' '%%'"
bind-key T   command-prompt -I "ssh " -p "sub(|):" "split-window -h 'exec %%'"
bind-key C-T command-prompt -I "ssh " -p "sub(-):" "split-window -v 'exec %%'"

## run-command
bind-key r   command-prompt -p "(run-shell)" "run-shell '%%'"

# sub window manpage
bind-key C-m command-prompt -p "man:" "split-window -v 'exec man %%'"

## help
bind-key H split-window -v "man tmux"
#}}}

# status bar and color settings {{{
set-option -g status-interval 29

set-option -g message-style fg=white,bg=green

set-option -wg window-status-style fg=white,bg=black
set-option -wg window-status-current-style fg=red,bg=white
set-option -wg window-status-activity-style fg=yellow,bg=blue,bold

set-option -g pane-border-style fg=cyan,bg=black
set-option -g pane-active-border-style fg=white,bg=magenta

set-option -g status-left-length 48
set-option -g status-right-length 50
set-option -g status-style fg=colour${MYHOSTCOLOR_FG},bg=colour${MYHOSTCOLOR_BG}

set-option -g status-left "#[default]#[fg=brightcyan,bg=black][#S:#I:#P]#[fg=blue,bg=yellow] #[default]"
MYENV="#(lsb_release -c --short)"
set-option -g status-right "#[default]#[fg=green bg=black] $MYENV #[fg=black bg=colour$MYHOSTCOLOR_BG] #h "

#set-option -g window-status-format '#I:#W#[fg=white bg=colour236]#{?window_bell_flag,🔔 ,}#{?window_activity_flag,⏳ ,}#{?window_zoomed_flag,🔍,} '

set-option -g status 2
STATUS_SECOND="#[fg=black,bg=white]#{?client_prefix,#[bg=yellow]#[fg=white],}#(tmux show-options -g prefix):#[fg=white,bg=green]#(echo $SSH_CLIENT | cut -d ' '  -f1)#[align=left fg=white bg=black]#{W:#{?window_bell_flag,🔔 :#[fg=red bg=black bold] #I:#W,}}#[align=right fg=white bg=black]#{?mouse,🐁  ,}"

set-option -g status-format[1] $STATUS_SECOND

# multi pane sync input(e/E) {{{
set-option -wg synchronize-panes off
bind-key e set-option -w synchronize-panes on \; set-option -g status-style "fg=white,bg=red" \; display 'synchronize begin'
bind-key E set-option -w synchronize-panes off \; set-option -g status-style "fg=colour$MYHOSTCOLOR_FG,bg=colour$MYHOSTCOLOR_BG" \; display 'synchronize end'
# }}}

# }}}

# Ready for recursive environment {{{
unbind C-q
bind-key C-q unbind-key -n C-a \; set-option prefix C-a \; set-option prefix2 C-A \; bind-key a send-prefix \; set-option -g status-style "fg=colour$MYHOSTCOLOR_FG,bg=colour$MYHOSTCOLOR_BG" \; display "prefix are recovered. use C-a."

unbind Q
bind-key Q   unbind-key -n C-q \; set-option prefix C-q \; set-option prefix2 C-Q \; bind-key q send-prefix \; set-option -g status-style "fg=white,bg=black" \; display "prefix are changed. use C-q.(If you want to recover,type C-q C-q)."
#}}}
unbind C-C
bind-key C-C new-window

